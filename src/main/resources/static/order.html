<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>My Orders</title>
    <link rel="stylesheet" href="orders.css">
</head>
<body>
<h1>My Orders</h1>
<button id="homeBtn">Home</button>
<div id="ordersContainer"></div>

<script>
    // Backend base URL
    const apiBase = "http://localhost:8080"; // dəyişdirsən lazım olarsa

    // Current user from localStorage
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    async function fetchOrders() {
        if (!currentUser || !currentUser.token) {
            alert("Token tapılmadı, login olun!");
            return;
        }

        try {
            const response = await fetch(`${apiBase}/api/orders/my`, {
                headers: {
                    "Authorization": "Bearer " + currentUser.token
                }
            });

            if (!response.ok) throw new Error("Fetch orders failed");

            const data = await response.json();
            renderOrders(data);
        } catch (err) {
            console.error(err);
            alert("Sifarişləri gətirmək mümkün olmadı!");
        }
    }

    function renderOrders(orders) {
        const container = document.getElementById("ordersContainer");
        container.innerHTML = '';

        // if (!orders || orders.length === 0) {
        //     container.innerHTML = '<p>No active orders</p>';
        //     return;
        // }
        if (!orders || orders.length === 0) {
            container.innerHTML = `
        <div class="empty-orders">
            <span class="empty-icon">📦</span>
            <p>Heç bir aktiv sifarişiniz yoxdur</p>
        </div>
    `;
            return;
        }

        orders.forEach(order => {
            const div = document.createElement("div");
            div.classList.add("order-item");

            let itemsHtml = order.items.map(i => `
    <div class="order-product">
        <div class="product-info">
            <span class="product-name">${i.productName}</span>
            <span class="product-qty">x ${i.quantity}</span>
            <span class="product-price">${i.price * i.quantity}₼</span>
        </div>
    </div>
`).join('');

// Yaratma vaxtı
            let createdAt = order.createdAt ? new Date(order.createdAt).toLocaleString() : "Tarix yoxdur";

// Order statusu (backend-də olmalıdır)
            let status = order.status || "PENDING";

            div.innerHTML = `
    <div class="order-header">
        <h3>Order #${order.id} - Total: ${order.totalPrice}₼</h3>
        <span class="order-date">${createdAt}</span>
    </div>
    <div class="order-status">
        Status: <span class="status-text">${status}</span>
    </div>
    <div class="order-items">${itemsHtml}</div>
    <button class="cancelOrderBtn" data-id="${order.id}">Cancel</button>
    <hr>
`;


            // Cancel button
            div.querySelector(".cancelOrderBtn").onclick = async () => {
                try {
                    const confirmCancel = confirm("Siz əminsiniz ki, sifarişi ləğv etmək istəyirsiniz?");
                    if (!confirmCancel) return;
                    const orderId = div.querySelector(".cancelOrderBtn").dataset.id;
                    const cancelResp = await fetch(`${apiBase}/api/orders/cancel/${orderId}`, {
                        method: "PUT",
                        headers: {
                            "Authorization": "Bearer " + currentUser.token
                        }
                    });

                    if (!cancelResp.ok) throw new Error("Cancel failed");

                    alert("Sifariş uğurla ləğv edildi!");
                    await fetchOrders();
                } catch (err) {
                    console.error(err);
                    alert("Sifarişi ləğv etmək mümkün olmadı!");
                }
            };

            container.appendChild(div);
        });
    }

    document.getElementById("homeBtn").addEventListener("click", () => {
        window.location.href = "home.html";
    });

    // Page load
    fetchOrders();
</script>
</body>
</html>
