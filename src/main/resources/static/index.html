<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern E-Commerce</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <h1 class="logo">GEM<span>SHOP</span></h1>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Məhsul axtar...">
            <button onclick="handleSearch()"><i class="fas fa-search"></i></button>
        </div>

        <div class="nav-actions">
            <div class="nav-links">
                <button onclick="showModal('authModal')" class="link-btn"><i class="fas fa-sign-in-alt"></i> Giriş</button>
                <button onclick="showModal('adminModal')" class="link-btn admin-only"><i class="fas fa-user-shield"></i> Admin</button>
            </div>

            <div class="nav-icons">
                <button id="cartBtn" class="icon-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartCount">0</span>
                </button>
            </div>
        </div>
    </div>
</nav>

<main class="container">
    <section class="categories-nav" id="categoryList">
        <button class="cat-btn active" onclick="filterByCategory('all')">Hamısı</button>
    </section>

    <div id="loading" class="hidden">Yüklənir...</div>
    <div id="errorMsg" class="error-banner hidden"></div>

    <div class="product-grid" id="productGrid"></div>
</main>

<div id="authModal" class="modal hidden">
    <div class="modal-content auth-form">
        <div class="modal-header">
            <div class="tabs">
                <button onclick="switchTab('login')" id="loginTab" class="active">Giriş</button>
                <button onclick="switchTab('register')" id="registerTab">Qeydiyyat</button>
            </div>
            <span class="close-modal" onclick="hideModal('authModal')">&times;</span>
        </div>

        <form id="loginForm" class="auth-box">
            <input type="text" id="loginUsername" placeholder="İstifadəçi adı" required>
            <input type="password" id="loginPass" placeholder="Şifrə" required>
            <button type="submit" class="primary-btn">Daxil ol</button>
        </form>

        <form id="registerForm" class="auth-box hidden">
            <div class="name-row">
                <input type="text" id="regFirstName" placeholder="Ad" required>
                <input type="text" id="regLastName" placeholder="Soyad" required>
            </div>
            <input type="text" id="regUsername" placeholder="İstifadəçi adı" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPass" placeholder="Şifrə" required>
            <button type="submit" class="primary-btn">Qeydiyyatı tamamla</button>
        </form>
    </div>
</div>

<div id="adminModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Yeni Məhsul</h2>
            <span class="close-modal" onclick="hideModal('adminModal')">&times;</span>
        </div>
        <form id="addProductForm" class="auth-box">
            <input type="text" id="prodName" placeholder="Məhsulun adı" required>
            <textarea id="prodDesc" placeholder="Təsvir (Description)" required></textarea>
            <div class="name-row">
                <input type="number" id="prodPrice" placeholder="Qiymət" step="0.01" required>
                <input type="number" id="prodStock" placeholder="Stok" required>
            </div>
            <input type="text" id="prodImage" placeholder="Şəkil URL-i" required>
            <select id="prodCategory" required>
            </select>
            <button type="submit" class="save-btn">Məhsulu Bazaya Əlavə Et</button>
        </form>
    </div>
</div>

<div id="cartModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Səbətiniz</h2>
            <span class="close-modal" id="closeCart">&times;</span>
        </div>
        <div id="cartItemsList" class="cart-items-container"></div>
        <div class="cart-footer">
            <h3>Cəmi: <span id="totalPrice">0.00</span> AZN</h3>
            <button class="checkout-btn">Sifarişi tamamla</button>
        </div>
    </div>
</div>

<script src="app.js" type="module"></script>
</body>
</html>
